<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For My Moon 🌙</title>
<style>

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
}

body {
    min-height: 100dvh;
    font-family: Arial;
    background: radial-gradient(circle at top, #1a1a40, #000010);
    color: white;
    display: block;
    padding: 20px 15px;
    overflow-x: hidden;
}

.card {
    width: 92vw;
    max-width: 700px;
    padding: 6vw 5vw;
    border-radius: 20px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.08);
    text-align: center;
    box-shadow: 0 0 25px rgba(255,255,255,0.25);
    position: relative;
    z-index: 1;
    margin: 20px auto;
}

.moon {
    font-size: 15vw;
    animation: glow 2s infinite;
    display: block;
    margin-bottom: 10px;
}

@keyframes glow {
    0%   { filter: drop-shadow(0 0 2px #fff); }
    50%  { filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 10px #fffbe6); }
    100% { filter: drop-shadow(0 0 2px #fff); }
}

h2 {
    font-size: 6vw;
    margin-bottom: 20px;
    font-weight: bold;
}

.buttons {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
}

button {
    width: 80%;
    padding: 4vw;
    border: none;
    border-radius: 14px;
    font-size: 4vw;
    font-weight: bold;
    cursor: pointer;
    touch-action: manipulation;
}

#yes { background: #7CFFCB; color: #000; }

#no {
    background: #ff6b6b;
    color: #fff;
    position: relative;
}

.letter {
    display: none;
    margin-top: 20px;
    text-align: center;
    line-height: 1.8;
    color: #ffd6ff;
    padding: 0 10px;
    word-break: normal;
}

.final {
    display: none;
    margin-top: 25px;
    font-size: 5vw;
    color: #ffb3ff;
    animation: fade 2s ease forwards;
    padding-bottom: 10px;
}

#surpriseBtn {
    display: none;
    margin: 20px auto 10px;
    background: linear-gradient(135deg, #ff9fff, #ffb347);
    color: #000;
    font-size: 4.5vw;
    padding: 4vw 6vw;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    animation: pulse 1.5s infinite;
    font-weight: bold;
    width: 85%;
    touch-action: manipulation;
}

@keyframes pulse {
    0%   { transform: scale(1);    box-shadow: 0 0 10px #ff9fff; }
    50%  { transform: scale(1.05); box-shadow: 0 0 25px #ff9fff, 0 0 40px #ffb347; }
    100% { transform: scale(1);    box-shadow: 0 0 10px #ff9fff; }
}

@keyframes fade {
    from { opacity: 0; }
    to   { opacity: 1; }
}

/* BIRTHDAY PAGE — SAME SIZE AS CARD */
#birthdayPage {
    display: none;
    width: 92vw;
    max-width: 700px;
    margin: 20px auto;
    text-align: center;
    animation: fadeIn 1.5s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* PHOTO — BIGGER AND ADJUSTABLE */
.photo-container {
    margin: 20px auto;
    width: 320px;
    height: 320px;
}

.photo-container img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    object-position:center top;
    border: 3px solid #ffb3ff;
    animation: photoGlow 2s infinite;
    filter:brightness(1.1)contrast(0.95) saturate (1.1)sepia(0.15);
}

@keyframes photoGlow {0%   { filter: drop-shadow(0 0 2px #fff); }
    50%  { filter: drop-shadow(0 0 6px #fff) drop-shadow(0 0 10px #fffbe6); }
    100% { filter: drop-shadow(0 0 2px #fff); }
    
}

/* MY MOON TEXT BELOW PHOTO */
.my-moon-text {
    font-size: 5vw;
    color: #ffd6ff;
    margin-top: 10px;
    margin-bottom: 5px;
    font-style: italic;
}

.bday-heading {
    font-size: 8vw;
    font-weight: bold;
    background: linear-gradient(135deg, #ffb3ff, #ffb347, #7CFFCB);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin: 15px 0 5px;
}

.bday-name {
    font-size: 9vw;
    font-weight: bold;
    background: linear-gradient(135deg, #ff9fff, #ffb347);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 20px;
}

.bday-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 6vw 5vw;
    box-shadow: 0 0 25px rgba(255,179,255,0.3);
    margin-top: 10px;
    margin-bottom: 30px;
}

.bday-message {
    font-size: 4.2vw;
    line-height: 2;
    color: #ffd6ff;
    text-align: center;
}

.star {
    position: fixed;
    top: -20px;
    pointer-events: none;
    z-index: -1;
    animation: fall linear;
}

@keyframes fall {
    0%   { transform: translateY(-20px); opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translateY(110vh); opacity: 0; }
}

.heart {
    position: fixed;
    bottom: -20px;
    pointer-events: none;
    z-index: -1;
    animation: floatUp linear;
    font-size: 20px;
}

@keyframes floatUp {
    0%   { transform: translateY(0);      opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translateY(-110vh); opacity: 0; }
}

}
</style>
</head>
<body>

<div class="card" id="mainCard">
    <div class="moon">🌙</div>
    <h2>Do you love me? ❤️</h2>
    <div class="buttons">
        <button id="yes">Yes 💖</button>
        <button id="no">No 💔</button>
    </div>
    <div id="letter" class="letter"></div>
    <div id="final" class="final">Forever yours ❤️🌙</div>
    <button id="surpriseBtn">🎁 Your Surprise is Here</button>
</div>

<div id="birthdayPage">
    <div class="photo-container">
        <img src="anaya.jpg" alt="My Moon">
    </div>
    <!-- MY MOON TEXT BELOW PHOTO -->
    <div class="my-moon-text">🌙 My Moon</div>
    <div class="bday-heading">Happy Birthday</div>
    <div class="bday-name">Anaya 🎂✨</div>
    <div class="bday-card">
        <div class="bday-message" id="bdayMessage"></div>
    </div>
</div>

<audio id="music" src="music.mp3"></audio>

<script>

const yes          = document.getElementById("yes");
const no           = document.getElementById("no");
const letter       = document.getElementById("letter");
const finalMsg     = document.getElementById("final");
const surpriseBtn  = document.getElementById("surpriseBtn");
const birthdayPage = document.getElementById("birthdayPage");
const mainCard     = document.getElementById("mainCard");
const bdayMsg      = document.getElementById("bdayMessage");

no.addEventListener("touchstart", (e) => {
    e.preventDefault();
    no.style.marginLeft = Math.random() * 80 - 40 + "px";
    no.style.marginTop  = Math.random() * 40 - 20 + "px";
});
no.addEventListener("mouseover", () => {
    no.style.marginLeft = Math.random() * 80 - 40 + "px";
    no.style.marginTop  = Math.random() * 40 - 20 + "px";
});

const lines = [
    "Meri Anaya ❤️",
    "",
    "I don't know where to start…",
    "but I just want you to know",
    "that I love you so much 🌙",
    "",
    "Sometimes I hurt you,",
    "sometimes I make mistakes…",
    "and I know I'm not perfect.",
    "",
    "But one thing is always true —",
    "my love for you is real and it's strong.",
    "",
    "You are not just someone in my life…",
    "you are my peace,",
    "my happiness,",
    "my everything ❤️",
    "",
    "Even when I act stupid,",
    "even when I don't express properly…",
    "inside, I care for you",
    "more than anything.",
    "",
    "I promise I'll try to be better,",
    "for you… for us.",
    "",
    "Because losing you is something",
    "I can never imagine.",
    "",
    "I love you forever, Anaya ❤️🥺"
];

/* ADD YOUR BIRTHDAY MESSAGE BELOW */
const bdayLines = [
"Happy Birthday Anaya 🎂🦋🌸🌙",
"I wish you the best birthday ever May all your wishes may come true and may your life be filled with happiness success and lots of beautiful moments 💖🦋🌸",

"Aur Anaya mujhe aaj bhi yaad hai sab pehle ki baatein moments aur sab kuch aur Anaya mai janta hu abhi hamare beech me kuch acha nahi chal raha aur bohot si chije hai aur mai tumhe hurt bhi kar deta hu par Anaya mujhe tum par pura trust hai mohabbat hai tumse aur mai apni sari chije sab thik kar lunga mai tumhe kho nahi sakta khud ki sari chije thik kar lunga aur Anaya aaj bhi mere liye tum pehle jaisi hi ho jaise maine kaha tha mai sab jhel lunga sab Anaya ke nakhre uska gussa usko jis wajah se insecure feel hota sab mujhe accept hai mujhe Anaya ke paas rehna hai tumhare paas sukoon milta hai mujhe jo kahi nahi milta siwaye tumhare kahi bhi nahi milta mujhe aur I love you so much and forever I will love you you are best part of my life and I am happiest with you aur happy birthday bacha 👀🎂🦋🌸",

"Mai hamesha bhool jata hu lekin mai ye bhi thik kar lunga aur aaj birthday wish kar diya na aise hi mai sari chije sab thik kar lunga apna gussa apni jo kami hai Anaya ke liye aur mujhe pata hai tum soch rahi hogi sam ko yaad hoga ki nahi ye waha bohot si par mujhe yaad hai hamesha rehta hai aur aaj bhi tha aur bacha tum haste hue bohot achi lagti ho bohot jyada tumhara face bohot chamakta hai jab tum smile karti ho mera mann karta tumhe khush rakhu smile karti rahe Anaya blush karau 🫣🦋🌸",

"aur mai tumhe hamesha chahta hu hamesha chahunga tum meri zindagi ho aur mujhe ache lines bolne nahi aate 😭🌙 kaise bataun apni feelings shabdo me bata nahi sakta tum mere liye jitna mayne rakhti ho utna koi nahi rakhta aur sab thik ho jayega tum jyada tension na lo aur mai nahi ja raha kahi tumhe yaad hai tumne kaha tha ki maine date likha tha taki dekh saku tum kab tak rukoge dekho ab tak ruka hu aur aage bhi rukunga 27 August jab Anaya ne pehli baar mujhe message kiya tha 🫣👀🌙",

"socha bhi nahi tha ki yaha tak aayenge aur itna aaye aage bhi sab thik hoga dua karo mai bhi karta hu Anaya tum ye dekho na mai pyaar par believe nahi karta ki sachha pyaar tumse kaha bhi tha lekin dekho na mai khud tumhara wait kar raha hu mujhe wait karna nahi pasand lekin kar raha kyuki mujhe tumhare sath rehna hai aur tum batao na Salar Imama ke liye itna kyu ho gaya usko body chahiye hoti to kahi se le leta na Imama se usko pyaar tha aur mujhe tumse hai Anaya agar nahi hota to tumhare liye intezar nahi karta baki aage bhi acha hoga itna na socho bacha 🌸🦋",

"mai thik hu aur tum bhi thik ho jao bas apna khayal rakho 😒🌙 bas yahi ek hota hai khayal nahi rakhti apna kya tumhe mere par taras nahi aata apna kya haal bana liya hai aur maaf kar do aapko har baar hurt kar deta 🥺🦋🌸",

"Mujhe sukoon sirf anaya ke pass hi milta hai 🩷",

"aur I love you bacha itna ♾️👀🎂🦋🌸🌙"
];

function createLine(text, size) {
    let line = document.createElement("p");
    line.style.opacity    = "0";
    line.style.transform  = "translateY(10px)";
    line.style.transition = "all 0.8s ease";
    line.style.margin     = "4px 0";
    line.style.fontSize   = size;
    line.style.lineHeight = "1.8";
    line.innerHTML = text || "&nbsp;";
    setTimeout(() => {
        line.style.opacity   = "1";
        line.style.transform = "translateY(0)";
    }, 100);
    return line;
}

function typeLines(i) {
    if(i < lines.length) {
        letter.appendChild(createLine(lines[i], "4.2vw"));
        window.scrollTo(0, document.body.scrollHeight);
        setTimeout(() => typeLines(i + 1), 1200);
    } else {
        setTimeout(() => {
            finalMsg.style.display = "block";
            window.scrollTo(0, document.body.scrollHeight);
            setTimeout(() => {
                surpriseBtn.style.display = "block";
                window.scrollTo(0, document.body.scrollHeight);
            }, 1500);
        }, 1000);
    }
}

yes.addEventListener("click", () => {
    yes.style.display    = "none";
    no.style.display     = "none";
    letter.style.display = "block";
    document.getElementById("music").play();
    typeLines(0);
});

surpriseBtn.addEventListener("click", () => {
    mainCard.style.display     = "none";
    birthdayPage.style.display = "block";
    window.scrollTo(0, 0);
    starCount = 999;
    startHearts();
    setTimeout(() => typeBday(0), 1000);
});

function typeBday(i) {
    if(i < bdayLines.length) {
        bdayMsg.appendChild(createLine(bdayLines[i], "4.2vw"));
        window.scrollTo(0, document.body.scrollHeight);
        setTimeout(() => typeBday(i + 1), 1200);
    }
}

let starCount = 0;
function createStar() {
    if(starCount > 3) return;
    let s = document.createElement("div");
    s.className = "star";
    s.innerHTML = "⭐";
    s.style.left              = Math.random() * window.innerWidth + "px";
    s.style.animationDuration = (5 + Math.random() * 4) + "s";
    s.style.fontSize          = (12 + Math.random() * 8) + "px";
    document.body.appendChild(s);
    starCount++;
    setTimeout(() => { s.remove(); starCount--; }, 8000);
}
setInterval(createStar, 3000);

let heartCount = 0;
function createHeart() {
    if(heartCount > 8) return;
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = ["❤️","💖","💗","💓","💕"][Math.floor(Math.random() * 5)];
    h.style.left              = Math.random() * window.innerWidth + "px";
    h.style.animationDuration = (4 + Math.random() * 4) + "s";
    document.body.appendChild(h);
    heartCount++;
    setTimeout(() => { h.remove(); heartCount--; }, 7000);
}

function startHearts() {
    setInterval(createHeart, 800);
}

</script>
</body>
</html>
